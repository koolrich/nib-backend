name: Destroy Development Environment

on:
   workflow_dispatch:

permissions:
        id-token: write
        contents: read

jobs:
    destroy-dev:
      runs-on: ubuntu-latest

      env:
         AWS_REGION: ${{ vars.DEV_AWS_REGION }}
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      steps:
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::021891595998:role/TerraformUserRole
            aws-region: ${{ env.AWS_REGION }}
  
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Terraform CLI
          uses: hashicorp/setup-terraform@v2
          with:
              terraform_version: "1.12.2"
  
        - name: Create placeholder zips for Terraform hash functions
          run: |
            cd infra/environments/dev
            for name in layer send_invite validate_invite register login events members payments sms_dispatcher; do
              touch dummy && zip "${name}.zip" dummy && rm dummy
            done

        - name: Destroy Terraform Resources
          env:
            TF_VAR_twilio_account_sid: ${{ secrets.TWILIO_ACCOUNT_SID }}
            TF_VAR_twilio_auth_token: ${{ secrets.TWILIO_AUTH_TOKEN }}
          run: |
            cd infra/environments/dev
            terraform init
            terraform destroy -auto-approve