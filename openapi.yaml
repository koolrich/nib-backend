openapi: 3.0.3
info:
  title: NIB API
  description: |
    Backend API for NIB (Ndi Igbo Basingstoke) — a members-only community association app.
    Invite-only registration. All protected endpoints require a Bearer JWT (ID token) obtained from POST /auth/login.
  version: 1.1.0

servers:
  - url: https://{apiId}.execute-api.eu-west-2.amazonaws.com
    description: AWS API Gateway (dev)

security: []

components:
  securitySchemes:
    CognitoJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ID token obtained from POST /auth/login

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LoginRequest:
      type: object
      properties:
        mobile:
          type: string
          example: "+447123456789"
        password:
          type: string
          example: "SecurePass1"
      required: [mobile, password]

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        id_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
      required: [access_token, id_token, refresh_token, expires_in]

    ValidateInviteRequest:
      type: object
      properties:
        activation_code:
          type: string
          example: "ABCD1234"
      required: [activation_code]

    ValidateInviteResponse:
      type: object
      properties:
        first_name:
          type: string
          example: "Alice"
        last_name:
          type: string
          example: "Smith"
        mobile:
          type: string
          example: "+447123456789"
        relationship:
          type: string
          enum: [spouse, other]
      required: [first_name, last_name, mobile, relationship]

    RegisterRequest:
      type: object
      properties:
        activation_code:
          type: string
          example: "ABCD1234"
        first_name:
          type: string
          example: "Alice"
        last_name:
          type: string
          example: "Smith"
        email:
          type: string
          format: email
          example: "alice@example.com"
        mobile:
          type: string
          example: "+447123456789"
        password:
          type: string
          example: "SecurePass1"
        birthday_day:
          type: integer
          minimum: 1
          maximum: 31
          example: 15
        birthday_month:
          type: integer
          minimum: 1
          maximum: 12
          example: 6
        membership_type:
          type: string
          enum: [individual, family]
          description: Required when relationship is 'other'. Omit when relationship is 'spouse'.
          example: "individual"
        address_line1:
          type: string
        address_line2:
          type: string
        town:
          type: string
        post_code:
          type: string
        state_of_origin:
          type: string
          description: Nigerian state
        lga:
          type: string
          description: Local Government Area
        relationship_status:
          type: string
          enum: [single, married, divorced, widowed]
        emergency_contact_name:
          type: string
        emergency_contact_phone:
          type: string
      required:
        - activation_code
        - first_name
        - last_name
        - email
        - mobile
        - password
        - birthday_day
        - birthday_month

    SendInviteRequest:
      type: object
      properties:
        first_name:
          type: string
          example: "Bob"
        last_name:
          type: string
          example: "Jones"
        mobile:
          type: string
          example: "+447111111111"
        relationship:
          type: string
          enum: [spouse, other]
      required: [first_name, last_name, mobile, relationship]

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "August General Meeting"
        date:
          type: string
          format: date
          example: "2026-08-12"
        type:
          type: string
          enum: [pledge, contribution]
        status:
          type: string
          enum: [upcoming, completed]
        description:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        total_contributions:
          type: number
          example: 250.00
        total_pledges:
          type: integer
          example: 4

    EventItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Crates of Coke"
        unit:
          type: string
          example: "crates"
        quantity_needed:
          type: number
          example: 10
        quantity_pledged:
          type: number
          example: 7
        quantity_remaining:
          type: number
          example: 3
        is_available:
          type: boolean
          example: true

    Pledge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
        member_name:
          type: string
          example: "Obi Chukwu"
        event_item_id:
          type: string
          format: uuid
        item_name:
          type: string
          example: "Crates of Coke"
        quantity:
          type: number
          example: 5
        status:
          type: string
          enum: [pledged, cancelled]
        created_at:
          type: string
          format: date-time

    Contribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
          nullable: true
        member_name:
          type: string
          example: "Ada Obi"
          description: "Anonymous" when member_id is null
        pledge_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          example: 50.00
        received_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true

    MyPledge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        event_title:
          type: string
          example: "August General Meeting"
        event_date:
          type: string
          format: date
        item_name:
          type: string
          example: "Crates of Coke"
        unit:
          type: string
          example: "crates"
        quantity:
          type: number
          example: 5
        status:
          type: string
          enum: [pledged, cancelled]
        contribution:
          type: object
          nullable: true
          properties:
            amount:
              type: number
              example: 50.00
            received_at:
              type: string
              format: date-time
        created_at:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      summary: Login
      description: Authenticate with phone number and password. Returns JWT tokens. Use the id_token as the Bearer token for all protected endpoints.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid phone number or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites/validate:
    post:
      summary: Validate invite code
      description: |
        Checks that an invite code is valid, unused and not expired.
        Returns pre-fill data for the registration form.
        The frontend should carry the activation_code forward to the register call — the user only types it once.
      operationId: validateInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateInviteRequest'
      responses:
        '200':
          description: Invite is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateInviteResponse'
        '400':
          description: Invite already used or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invalid activation code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      summary: Register new member
      description: |
        Creates a new member account using a valid invite code.
        - relationship = 'other': creates a new membership and invoice
        - relationship = 'spouse': links to the inviter's existing membership
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registration successful"
        '400':
          description: Validation error or missing membership_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invalid activation code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites:
    post:
      summary: Send an invite
      description: Sends an SMS invite. Requires authentication. The invite is linked to the authenticated member as the sender.
      operationId: sendInvite
      security:
        - CognitoJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendInviteRequest'
      responses:
        '200':
          description: Invite sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invite sent."
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events:
    post:
      summary: Create event
      description: Create a new event. Executive or admin only.
      operationId: createEvent
      security:
        - CognitoJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "August General Meeting"
                date:
                  type: string
                  format: date
                  example: "2026-08-12"
                type:
                  type: string
                  enum: [pledge, contribution]
                description:
                  type: string
                  nullable: true
              required: [title, date, type]
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing required fields or invalid type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List all events
      description: Returns all events ordered by date descending. Frontend filters by status as needed.
      operationId: listEvents
      security:
        - CognitoJWT: []
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'

  /events/{id}:
    get:
      summary: Get event details
      description: |
        Returns full event details including items (pledge events only), pledges and contributions.
        member_name is "Anonymous" where member_id is null on contributions.
      operationId: getEvent
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Event'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventItem'
                        description: Only present for pledge events
                      pledges:
                        type: array
                        items:
                          $ref: '#/components/schemas/Pledge'
                      contributions:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contribution'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Edit event
      description: |
        Edit event fields or mark as completed. Executive or admin only.
        All fields are optional — only provided fields are updated.
        Type cannot be changed if items or pledges already exist.
        Completed events cannot be edited.
      operationId: updateEvent
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                date:
                  type: string
                  format: date
                description:
                  type: string
                type:
                  type: string
                  enum: [pledge, contribution]
                status:
                  type: string
                  enum: [upcoming, completed]
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event already completed or type change not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/items:
    post:
      summary: Add items to a pledge event
      description: Add one or more items to a pledge event. Executive or admin only.
      operationId: addEventItems
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "Crates of Coke"
                      quantity_needed:
                        type: number
                        example: 10
                      unit:
                        type: string
                        example: "crates"
                    required: [name, quantity_needed, unit]
              required: [items]
      responses:
        '201':
          description: Items added
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventItem'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Not a pledge event, event completed, or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/pledges:
    post:
      summary: Create a pledge
      description: |
        Pledge against a specific item on a pledge event.
        A member can only have one pledge per item — subsequent attempts return 409.
        Quantity cannot exceed the remaining quantity for the item.
      operationId: createPledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_item_id:
                  type: string
                  format: uuid
                quantity:
                  type: number
                  example: 5
              required: [event_item_id, quantity]
      responses:
        '201':
          description: Pledge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pledge'
        '404':
          description: Event or item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Pledge already exists for this member and item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, not a pledge event, item fully pledged, or quantity exceeds remaining
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/pledges/{pledgeId}:
    patch:
      summary: Edit a pledge
      description: |
        Update the quantity on an existing pledge. Only the pledge owner can edit.
        New quantity cannot exceed the remaining quantity (excluding the member's existing pledge).
      operationId: updatePledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pledgeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: number
                  example: 8
              required: [quantity]
      responses:
        '200':
          description: Pledge updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pledge'
        '403':
          description: Pledge does not belong to calling member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or pledge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, pledge cancelled, or quantity exceeds remaining
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Cancel a pledge
      description: |
        Cancel an existing pledge. Only the pledge owner can cancel.
        Cannot cancel if a contribution has already been recorded against the pledge.
      operationId: cancelPledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pledgeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pledge cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "cancelled"
                  updated_at:
                    type: string
                    format: date-time
        '403':
          description: Pledge does not belong to calling member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or pledge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, pledge already cancelled, or pledge has been paid for
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/contributions:
    post:
      summary: Record a cash contribution
      description: |
        Record a cash contribution against an event. Executive or admin only.
        - member_id: null means anonymous contribution
        - pledge_id: null means a pure cash contribution not linked to any pledge
      operationId: recordContribution
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                member_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Omit or set null for anonymous contributions
                pledge_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Omit or set null for pure cash contributions
                amount:
                  type: number
                  example: 50.00
                received_at:
                  type: string
                  format: date-time
                  example: "2026-08-12T14:00:00Z"
                note:
                  type: string
                  nullable: true
              required: [amount, received_at]
      responses:
        '201':
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event, pledge or member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed or pledge cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/me/pledges:
    get:
      summary: Get my pledges
      description: Returns all active pledges for the authenticated member across all upcoming events. Includes contribution details where cash has been recorded.
      operationId: getMyPledges
      security:
        - CognitoJWT: []
      responses:
        '200':
          description: List of pledges
          content:
            application/json:
              schema:
                type: object
                properties:
                  pledges:
                    type: array
                    items:
                      $ref: '#/components/schemas/MyPledge'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
