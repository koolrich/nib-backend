openapi: 3.0.3
info:
  title: NIB API
  description: |
    Backend API for NIB (Ndi Igbo Basingstoke) — a members-only community association app.
    Invite-only registration. All protected endpoints require a Bearer JWT (ID token) obtained from POST /auth/login.
  version: 1.1.0

servers:
  - url: https://{apiId}.execute-api.eu-west-2.amazonaws.com
    description: AWS API Gateway (dev)

security: []

components:
  securitySchemes:
    CognitoJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: ID token obtained from POST /auth/login

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LoginRequest:
      type: object
      properties:
        mobile:
          type: string
          example: "+447123456789"
        password:
          type: string
          example: "SecurePass1"
      required: [mobile, password]

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        id_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
      required: [access_token, id_token, refresh_token, expires_in]

    ValidateInviteRequest:
      type: object
      properties:
        activation_code:
          type: string
          example: "ABCD1234"
      required: [activation_code]

    ValidateInviteResponse:
      type: object
      properties:
        first_name:
          type: string
          example: "Alice"
        last_name:
          type: string
          example: "Smith"
        mobile:
          type: string
          example: "+447123456789"
        relationship:
          type: string
          enum: [spouse, other]
      required: [first_name, last_name, mobile, relationship]

    RegisterRequest:
      type: object
      properties:
        activation_code:
          type: string
          example: "ABCD1234"
        first_name:
          type: string
          example: "Alice"
        last_name:
          type: string
          example: "Smith"
        email:
          type: string
          format: email
          example: "alice@example.com"
        mobile:
          type: string
          example: "+447123456789"
        password:
          type: string
          example: "SecurePass1"
        birthday_day:
          type: integer
          minimum: 1
          maximum: 31
          example: 15
        birthday_month:
          type: integer
          minimum: 1
          maximum: 12
          example: 6
        membership_type:
          type: string
          enum: [individual, family]
          description: Required when relationship is 'other'. Omit when relationship is 'spouse'.
          example: "individual"
        address_line1:
          type: string
        address_line2:
          type: string
        town:
          type: string
        post_code:
          type: string
        state_of_origin:
          type: string
          description: Nigerian state
        lga:
          type: string
          description: Local Government Area
        relationship_status:
          type: string
          enum: [single, married, divorced, widowed]
        emergency_contact_name:
          type: string
        emergency_contact_phone:
          type: string
      required:
        - activation_code
        - first_name
        - last_name
        - email
        - mobile
        - password
        - birthday_day
        - birthday_month

    SendInviteRequest:
      type: object
      properties:
        first_name:
          type: string
          example: "Bob"
        last_name:
          type: string
          example: "Jones"
        mobile:
          type: string
          example: "+447111111111"
        relationship:
          type: string
          enum: [spouse, other]
      required: [first_name, last_name, mobile, relationship]

    EventCreated:
      description: Response shape when an event is first created (no aggregate totals yet)
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "August General Meeting"
        date:
          type: string
          format: date
          example: "2026-08-12"
        type:
          type: string
          enum: [pledge, contribution]
        status:
          type: string
          enum: [upcoming, completed]
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Event:
      description: Event with live aggregate totals (returned by list and get)
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "August General Meeting"
        date:
          type: string
          format: date
          example: "2026-08-12"
        type:
          type: string
          enum: [pledge, contribution]
        status:
          type: string
          enum: [upcoming, completed]
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        total_contributions:
          type: number
          example: 250.00
        total_pledges:
          type: integer
          example: 4

    EventUpdated:
      description: Response shape after a PATCH — includes updated_at, no aggregate totals
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        date:
          type: string
          format: date
        type:
          type: string
          enum: [pledge, contribution]
        status:
          type: string
          enum: [upcoming, completed]
        description:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    EventItemCreated:
      description: Response shape when items are added to an event (no pledge aggregates yet)
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Crates of Coke"
        quantity_needed:
          type: number
          example: 10
        unit:
          type: string
          example: "crates"
        created_at:
          type: string
          format: date-time

    EventItem:
      description: Event item with live pledge aggregates (returned within GET /events/{id})
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Crates of Coke"
        unit:
          type: string
          example: "crates"
        quantity_needed:
          type: number
          example: 10
        quantity_pledged:
          type: number
          example: 7
        quantity_remaining:
          type: number
          example: 3
        is_available:
          type: boolean
          example: true

    PledgeCreated:
      description: Response shape when a pledge is created or updated (no member/item name joins)
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
        event_item_id:
          type: string
          format: uuid
        quantity:
          type: number
          example: 5
        status:
          type: string
          enum: [pledged, cancelled]
        created_at:
          type: string
          format: date-time

    Pledge:
      description: Pledge with joined member and item names (returned within GET /events/{id})
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
        member_name:
          type: string
          example: "Obi Chukwu"
        event_item_id:
          type: string
          format: uuid
        item_name:
          type: string
          example: "Crates of Coke"
        quantity:
          type: number
          example: 5
        status:
          type: string
          enum: [pledged, cancelled]
        created_at:
          type: string
          format: date-time

    Contribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        member_id:
          type: string
          format: uuid
          nullable: true
        member_name:
          type: string
          example: "Ada Obi"
          description: "Anonymous" when member_id is null
        pledge_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          example: 50.00
        received_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true

    MemberProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          nullable: true
        mobile:
          type: string
        address_line1:
          type: string
          nullable: true
        address_line2:
          type: string
          nullable: true
        town:
          type: string
          nullable: true
        post_code:
          type: string
          nullable: true
        state_of_origin:
          type: string
          nullable: true
        lga:
          type: string
          nullable: true
        birthday_day:
          type: integer
          nullable: true
        birthday_month:
          type: integer
          nullable: true
        relationship_status:
          type: string
          nullable: true
        emergency_contact_name:
          type: string
          nullable: true
        emergency_contact_phone:
          type: string
          nullable: true
        member_role:
          type: string
          enum: [member, executive, admin]
        status:
          type: string
          enum: [pending, active, inactive, rejected]
        is_legacy:
          type: boolean
        date_joined:
          type: string
          format: date
          nullable: true
        membership_type:
          type: string
          enum: [individual, family, student]
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    MemberListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        member_role:
          type: string
          enum: [member, executive, admin]
        date_joined:
          type: string
          format: date
          nullable: true
        membership_type:
          type: string
          enum: [individual, family, student]
          nullable: true
        payment_status:
          type: string
          description: Invoice status for current period. Only included for executive/admin callers.
          nullable: true

    MembershipPeriod:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_id:
          type: string
          format: uuid
        start_date:
          type: string
          format: date
          example: "2024-01-01"
        end_date:
          type: string
          format: date
          example: "2024-12-31"
        status:
          type: string
          enum: [active, expired]
        created_at:
          type: string
          format: date-time

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        membership_period_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          example: "NIB-0001"
        issue_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        amount_due:
          type: number
          example: 60.00
        status:
          type: string
          enum: [unpaid, partial, paid]
        created_at:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        amount:
          type: number
          example: 25.00
        method:
          type: string
          enum: [bank_transfer, cash, cheque, other]
        reference:
          type: string
          nullable: true
          example: "REF123"
        received_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    StatementPayment:
      description: Payment as returned within a member statement (no invoice_id redundancy)
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          example: 25.00
        method:
          type: string
          enum: [bank_transfer, cash, cheque, other]
        reference:
          type: string
          nullable: true
        received_at:
          type: string
          format: date-time
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    MyPledge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        event_title:
          type: string
          example: "August General Meeting"
        event_date:
          type: string
          format: date
        item_name:
          type: string
          example: "Crates of Coke"
        unit:
          type: string
          example: "crates"
        quantity:
          type: number
          example: 5
        status:
          type: string
          enum: [pledged, cancelled]
        contribution:
          type: object
          nullable: true
          properties:
            amount:
              type: number
              example: 50.00
            received_at:
              type: string
              format: date-time
        created_at:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      summary: Login
      description: Authenticate with phone number and password. Returns JWT tokens. Use the id_token as the Bearer token for all protected endpoints.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid phone number or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites/validate:
    post:
      summary: Validate invite code
      description: |
        Checks that an invite code is valid, unused and not expired.
        Returns pre-fill data for the registration form.
        The frontend should carry the activation_code forward to the register call — the user only types it once.
      operationId: validateInvite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateInviteRequest'
      responses:
        '200':
          description: Invite is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateInviteResponse'
        '400':
          description: Invite already used or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invalid activation code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      summary: Register new member
      description: |
        Creates a new member account using a valid invite code.
        - relationship = 'other': creates a new membership and invoice
        - relationship = 'spouse': links to the inviter's existing membership
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registration successful"
        '400':
          description: Validation error or missing membership_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invalid activation code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites:
    post:
      summary: Send an invite
      description: Sends an SMS invite. Requires authentication. The invite is linked to the authenticated member as the sender.
      operationId: sendInvite
      security:
        - CognitoJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendInviteRequest'
      responses:
        '200':
          description: Invite sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invite sent."
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events:
    post:
      summary: Create event
      description: Create a new event. Executive or admin only.
      operationId: createEvent
      security:
        - CognitoJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "August General Meeting"
                date:
                  type: string
                  format: date
                  example: "2026-08-12"
                type:
                  type: string
                  enum: [pledge, contribution]
                description:
                  type: string
                  nullable: true
              required: [title, date, type]
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreated'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Missing required fields or invalid type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List all events
      description: Returns all events ordered by date descending. Frontend filters by status as needed.
      operationId: listEvents
      security:
        - CognitoJWT: []
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'

  /events/{id}:
    get:
      summary: Get event details
      description: |
        Returns full event details including items (pledge events only), pledges and contributions.
        member_name is "Anonymous" where member_id is null on contributions.
      operationId: getEvent
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Event'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/EventItem'
                        description: Only present for pledge events
                      pledges:
                        type: array
                        items:
                          $ref: '#/components/schemas/Pledge'
                      contributions:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contribution'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      summary: Edit event
      description: |
        Edit event fields or mark as completed. Executive or admin only.
        All fields are optional — only provided fields are updated.
        Type cannot be changed if items or pledges already exist.
        Completed events cannot be edited.
      operationId: updateEvent
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                date:
                  type: string
                  format: date
                description:
                  type: string
                type:
                  type: string
                  enum: [pledge, contribution]
                status:
                  type: string
                  enum: [upcoming, completed]
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventUpdated'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event already completed or type change not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/items:
    post:
      summary: Add items to a pledge event
      description: Add one or more items to a pledge event. Executive or admin only.
      operationId: addEventItems
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "Crates of Coke"
                      quantity_needed:
                        type: number
                        example: 10
                      unit:
                        type: string
                        example: "crates"
                    required: [name, quantity_needed, unit]
              required: [items]
      responses:
        '201':
          description: Items added
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventItemCreated'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Not a pledge event, event completed, or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/items/{itemId}:
    patch:
      summary: Update an event item
      description: Update name, quantity_needed or unit on an item. Executive or admin only. Not allowed if active pledges exist.
      operationId: patchEventItem
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                quantity_needed:
                  type: number
                unit:
                  type: string
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventItemCreated'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed or item has active pledges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete an event item
      description: Delete an item from a pledge event. Executive or admin only. Not allowed if active pledges exist.
      operationId: deleteEventItem
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed or item has active pledges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/pledges:
    post:
      summary: Create a pledge
      description: |
        Pledge against a specific item on a pledge event.
        A member can only have one pledge per item — subsequent attempts return 409.
        Quantity cannot exceed the remaining quantity for the item.
      operationId: createPledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_item_id:
                  type: string
                  format: uuid
                quantity:
                  type: number
                  example: 5
              required: [event_item_id, quantity]
      responses:
        '201':
          description: Pledge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PledgeCreated'
        '404':
          description: Event or item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Pledge already exists for this member and item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, not a pledge event, item fully pledged, or quantity exceeds remaining
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/pledges/{pledgeId}:
    patch:
      summary: Edit a pledge
      description: |
        Update the quantity on an existing pledge. Only the pledge owner can edit.
        New quantity cannot exceed the remaining quantity (excluding the member's existing pledge).
      operationId: updatePledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pledgeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: number
                  example: 8
              required: [quantity]
      responses:
        '200':
          description: Pledge updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PledgeCreated'
        '403':
          description: Pledge does not belong to calling member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or pledge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, pledge cancelled, or quantity exceeds remaining
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Cancel a pledge
      description: |
        Cancel an existing pledge. Only the pledge owner can cancel.
        Cannot cancel if a contribution has already been recorded against the pledge.
      operationId: cancelPledge
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: pledgeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pledge cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    example: "cancelled"
                  updated_at:
                    type: string
                    format: date-time
        '403':
          description: Pledge does not belong to calling member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event or pledge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed, pledge already cancelled, or pledge has been paid for
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}/contributions:
    post:
      summary: Record a cash contribution
      description: |
        Record a cash contribution against an event. Executive or admin only.
        - member_id: null means anonymous contribution
        - pledge_id: null means a pure cash contribution not linked to any pledge
      operationId: recordContribution
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                member_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Omit or set null for anonymous contributions
                pledge_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Omit or set null for pure cash contributions
                amount:
                  type: number
                  example: 50.00
                received_at:
                  type: string
                  format: date-time
                  example: "2026-08-12T14:00:00Z"
                note:
                  type: string
                  nullable: true
              required: [amount, received_at]
      responses:
        '201':
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contribution'
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Event, pledge or member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Event completed or pledge cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members:
    get:
      summary: List members
      description: Returns all active members. Regular members see basic info; executives and admins additionally see payment_status for the current membership period.
      operationId: listMembers
      security:
        - CognitoJWT: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Filter by first or last name (case-insensitive partial match)
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/MemberListItem'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/{id}:
    get:
      summary: Get member profile
      description: Returns full profile for any member. Executives can view any member; regular members can only view their own.
      operationId: getMemberById
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Update member profile
      description: Update a member's profile fields. Members can update their own profile. Executives and admins can update any member's profile, including role and status.
      operationId: patchMember
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                mobile:
                  type: string
                address_line1:
                  type: string
                address_line2:
                  type: string
                town:
                  type: string
                post_code:
                  type: string
                state_of_origin:
                  type: string
                lga:
                  type: string
                birthday_day:
                  type: integer
                birthday_month:
                  type: integer
                relationship_status:
                  type: string
                emergency_contact_name:
                  type: string
                emergency_contact_phone:
                  type: string
                member_role:
                  type: string
                  enum: [member, executive, admin]
                  description: Executives and admins only
                status:
                  type: string
                  enum: [pending, active, inactive, rejected]
                  description: Executives and admins only
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '403':
          description: Not authorised to update this member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/me:
    get:
      summary: Get my profile
      description: Returns the authenticated member's full profile including role and membership details. Call this immediately after login to get the member's UUID and role.
      operationId: getMyProfile
      security:
        - CognitoJWT: []
      responses:
        '200':
          description: Member profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberProfile'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/me/pledges:
    get:
      summary: Get my pledges
      description: Returns all active pledges for the authenticated member across all upcoming events. Includes contribution details where cash has been recorded.
      operationId: getMyPledges
      security:
        - CognitoJWT: []
      responses:
        '200':
          description: List of pledges
          content:
            application/json:
              schema:
                type: object
                properties:
                  pledges:
                    type: array
                    items:
                      $ref: '#/components/schemas/MyPledge'
        '403':
          description: Authenticated member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invoices/{id}/payments:
    post:
      summary: Record a payment against an invoice
      description: |
        Records a partial or full payment toward an outstanding invoice.
        Executive or admin only.
        - Amount must not exceed the outstanding balance.
        - Invoice status is updated automatically (unpaid → partial → paid).
      operationId: recordPayment
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  example: 25.00
                method:
                  type: string
                  enum: [bank_transfer, cash, cheque, other]
                reference:
                  type: string
                  nullable: true
                  example: "REF123"
                received_at:
                  type: string
                  format: date-time
                  example: "2026-02-01T10:00:00Z"
                note:
                  type: string
                  nullable: true
              required: [amount, method, received_at]
      responses:
        '201':
          description: Payment recorded. Invoice summary shows updated status and balances.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Payment'
                  - type: object
                    properties:
                      invoice:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [unpaid, partial, paid]
                          amount_due:
                            type: number
                          total_paid:
                            type: number
                          outstanding:
                            type: number
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invoice not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Invoice already paid, amount exceeds balance, invalid method, or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payments/{id}:
    delete:
      summary: Delete a payment
      description: |
        Deletes a payment record. Executive or admin only.
        Invoice status is recalculated automatically after deletion.
        Use this to correct a mistakenly recorded payment.
      operationId: deletePayment
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment deleted. Returns the recalculated invoice status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Payment deleted"
                  invoice_status:
                    type: string
                    enum: [unpaid, partial, paid]
        '403':
          description: Executive access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /members/{id}/statement:
    get:
      summary: Get a member's payment statement
      description: |
        Returns the member's active membership period, current invoice with balances,
        and all payments made against that invoice.
        Members can only view their own statement. Executives can view any member's statement.
        Returns period: null and invoice: null if no active period or invoice exists.
      operationId: getMemberStatement
      security:
        - CognitoJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member statement
          content:
            application/json:
              schema:
                type: object
                properties:
                  member_id:
                    type: string
                    format: uuid
                  membership_type:
                    type: string
                    nullable: true
                    example: "individual"
                  period:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/MembershipPeriod'
                  invoice:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/Invoice'
                      - type: object
                        properties:
                          total_paid:
                            type: number
                            example: 25.00
                          outstanding:
                            type: number
                            example: 35.00
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatementPayment'
        '403':
          description: Access denied (non-executive viewing another member's statement)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
